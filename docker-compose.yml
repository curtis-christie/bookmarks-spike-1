services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER: bookmarks
      - POSTGRES_PASSWORD: bookmarks
      - POSTGRES_DB: bookmarks
    ports:
      - "5433:5432"
    volumes:
      - bookmarks-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookmarks -d bookmarks"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  bookmarks-data:
